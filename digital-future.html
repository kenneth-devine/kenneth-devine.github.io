## DIGITAL FUTURE

Set in the distant future, where humanity has matrix'd itself on purpose. All conscious beings now reside in a digital realm created eons ago. To it's residence, the digital is material, and the material is spiritual. The world they live in is not a sandbox. It is governed by rules, set by administrators. 

Humans can only safely have 500 years of memory. Thus, all humans within the digital have their memories continually stored externally. This way, they can be reviewed every so often. 

The creators of the system didn't want to crrate any existential horror, so they gave users the ability to terminate themselves. 

When the main character entered the digital, he had a wife. Many cycles ago, she self-terminated. Every once and a while, he looks at their memories together at the great library. 

He finds that the memories are corrupted!!! He sets out to save his remaining memories with his wife...

Inspired by BLAME!

## ALTERNATE CHURCH

an alternate universe and timeline. just like ours, but without Christ...

There is a Church, however. Thousands of years ago, the Prophet came. He performed great miracles, and beckoned the world to prepare for the messiah. In his humility, he never let his face or name be known. The Prophet formed a structure, communicating God's law, and the conditions necessary for the Messiah's arrival. This is now known as the Church. 
In this world, most humans worship some kind of god. SA demon gods, African spirits, European pantheons, and just straight up demons. They can bring genuine effects about and be seen. The Church is not wholly united, either. A sect claims to have found the vessel, the God-mother. The Church denies this, however.

## MULTIPLAYER DREAMING

Multiplayer dreaming... and you have powers inside of the dreams... like, powers of imagination or something. And maybe to central conflict is that the world government wants to create a legal apparatus within the world of dreams, backed by a corporation which wants to use the dream world for marketing and advertisements. Thus, the Dream Freedom Force (DFF) is formed, fighting for anonymity and freedom in the dream world.

How would the dream powers work? Maybe as a child, you only have access to your own personal dream world. Then, at some point in your adolescence, you gain access to a central dream world, through a city of doors or something. Maybe you can move your door. You're always able to access your personal dream world. Your dream world is very easily influenced by your imagination. Essentially, you can create and manipulate it mostly. 

To start with, your world is empty. As you explore and create, eventually you will encounter dream spirits. These guys are drawn to certain kinds of people. They don't really behave like humans, and have many different looks. They will seek citizenship in your world. In exchange, they offer different pacts. The most common:
- Privacy Pact: they will not share any information about you or your world with others.
- Truth Pact: they will always be honest to you.
- Obedience Pact: they will obey you, at the consequence of exile.
They can also create stories and items. Basically, you provide them company and/or a sick place to live, and they'll give you company, help you create, and go on adventures. You can exile them at any time. 

Children are given necklaces when they sleep containing these contracts. Thus, instead of memorizing their terms, they simply make the spirits agree to "everything in my necklace."

Your appearance in the dream world is somewhat fluid. It is strongly influenced by your self perception. It can be shifted using your willpower and certain items.

Outside of your domain, you can be "killed." This sends you back to your own domain. You can also send yourself back at any time. The central spire is less controllable, but still has toon logic. Your true powers come from sponsors. Sponsors are very powerful spirits. They make a pact with dreamers, usually restricting them to one sponsorship. They can have many different demands. Sponsors are very powerful and also strange. Their goals don't always make sense to humans. Some have spirits that worship them, and sponsor dreamers to create a home for said followers. Others send them on quests into the outer dreamwilds to retrieve information, items, or defeat spirits.

How did this happen? Well, it wasn't always like this. Unusual dreams started occurring in the two-thousands. Oddly lucid and persistent dreams and characters. At first, it was just considered an internet rumor, but scientific studies proved that something was happening. The spirits didn't help much. The best theory is that the human population became high enough that our collective subconscious somehow became... real.

Ooh, maybe another conflict is that there are spirits that hate humans. To keep us out, there's only one solution. Lower the population through any means necessary. The humans that help them are promised wealth and safety. Roko's basilisk, in a sense.

The world is formed around the Central Spire. The Central Spire is actually an area protected by a sponsor. The Security Spirit allows anyone to have a locked door within the spire, as long as they allow an ambassador citizenship. Once you do so, you can lock your door, as well as have said ambassador allow people in and out. Most of the human population has a pact with the Security spirit. The spirit is believed to derive joy from people's security. Thus, it doesn't allow gory, scary, or sexual things within domains, for the most part. No blood, and no genitals. 

Outside of the Spire are the dream wilds. These don't really follow Euclidian laws or gravity. The quickest way to travel the wilds are the trains. There are trains... hard to describe. There are Conductor spirits that take you wherever. You need a ticket though.

## MECHS AND STUFF

Couple random ideas for a mech centered story.

1. Basically to interface with mechs you need a translation layer from machine code to human neural input and the only way discovered is to use a human brain. Similar to Pacific Rim except instead of two pilots controlling the machine in tandem, it's one pilot, with the instructions passing through a person. The kicker is that they use braindead people as the translation layer. Either keep their bodies on life-support within the mech, or extract the brains somehow. And then the pilots, like Pacific Rim, form an unconscious bond with the translator.
2. Alien spiders take over the earth. Just a simple enemy for sick mechs to fight. 
3. To fight aliens, we take one of the alien weapons, which turns out to be a biological weapon, like an alien horse. We basically harness the horse, so to speak, and use it to fight back. The organism is unique in that it has magnetic organs. Parts of its body are not physically attached, but rather magnetically attached. They use magnetic propulsion to fly at great speeds. They have long, hardened cone shape bodies which they use to pierce enemies. They have long slit-like ocular organs, and 4 tentacles on their underside used for feeding. These creatures are placed within... mechs, of course, fed fuel rods, and piloted from within their own brains.

<script>
  // --- THEME CYCLING ---
  const themes = ['theme-midnight', 'theme-dusk', 'theme-cafe', 'theme-sunny'];

  function getCurrentThemeIndex() {
    for (let i = 0; i < themes.length; i++) {
      if (document.body.classList.contains(themes[i])) return i;
    }
    return -1;
  }

  function setTheme(index) {
    themes.forEach(t => document.body.classList.remove(t));
    document.body.classList.add(themes[index]);
    localStorage.setItem('theme', themes[index]);
  }

  document.getElementById('btn-palette').addEventListener('click', () => {
    const next = (getCurrentThemeIndex() + 1) % themes.length;
    setTheme(next);
  });

  const savedTheme = localStorage.getItem('theme');
  if (savedTheme && themes.includes(savedTheme)) {
    document.body.classList.add(savedTheme);
  }

  // --- FONT CYCLING
  const fonts = ['font-jetbrains', 'font-georgia'];

  function getCurrentFontIndex() {
    for (let i = 0; i < fonts.length; i++) {
      if (document.body.classList.contains(fonts[i])) return i;
    }
    return -1;
  }

  function setFont(index) {
    fonts.forEach(t => document.body.classList.remove(t));
    document.body.classList.add(fonts[index]);
    localStorage.setItem('font', fonts[index]);
  }

  document.getElementById('btn-font').addEventListener('click', () => {
    const next = (getCurrentFontIndex() + 1) % fonts.length;
    setFont(next);
  });

  const savedFont = localStorage.getItem('font');
  if (savedFont && fonts.includes(savedFont)) {
    document.body.classList.add(savedFont);
  }

  // --- ZEN MODE ---
  let zenActive = false;
  const topbar = document.getElementById('topbar');

  document.getElementById('btn-zen').addEventListener('click', () => {
    zenActive = !zenActive;
    if (zenActive) {
      topbar.classList.add('zen-hidden');
    } else {
      topbar.classList.remove('zen-hidden');
      topbar.classList.remove('zen-peek');
    }
  });

  document.addEventListener('mousemove', (e) => {
    if (!zenActive) return;
    if (e.clientY <= 50) {
      topbar.classList.add('zen-peek');
    } else {
      topbar.classList.remove('zen-peek');
    }
  });
</script>
