name: Generate HTML from Markdown

on:
  push:
    paths:
      - 'markdown/**.md'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed to detect changed files

      - name: Generate HTML for new/changed .md files
        run: |
          # Get list of added or modified .md files in this push
          CHANGED=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'markdown/*.md')

          for MD_PATH in $CHANGED; do
            # e.g. markdown/blog-post.md -> blog-post
            BASENAME=$(basename "$MD_PATH" .md)

            # Skip if HTML already exists (only generate, never overwrite)
            if [ -f "${BASENAME}.html" ]; then
              echo "Skipping ${BASENAME}.html — already exists"
              continue
            fi

            echo "Generating ${BASENAME}.html from ${MD_PATH}"

            sed "s|__MD_FILE__|markdown/${BASENAME}.md|g; s|__TITLE__|${BASENAME}|g" \
              .github/page-template.html > "${BASENAME}.html"
          done

      - name: Commit generated HTML files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html
          # Only commit if there's something new
          git diff --cached --quiet || git commit -m "Auto-generate HTML for new markdown pages"
          git push
